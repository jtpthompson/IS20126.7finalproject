<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe: Ultimate Loser Edition</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #dbeafe, #e0f2fe, #f0f9ff);
        min-height: 100vh;
        margin: 0;
    }

    /* NAVBAR */
    nav {
        background: #1e3a8a;
        padding: 10px 20px;
        display: flex;
        justify-content: flex-start;
        align-items: center;
    }

    nav a {
        color: white;
        text-decoration: none;
        font-weight: bold;
        margin-right: 20px;
    }

    nav a:hover {
        color: #b9b9b9;
    }

    h1 { margin-top: 20px; }

    #game {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        gap: 5px;
        justify-content: center;
        margin: 20px auto;
    }

    .cell {
        width: 100px;
        height: 100px;
        background: white;
        border: 2px solid #333;
        font-size: 2.5em;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    .cell:hover { background: #f1f5f9; }

    #controls { margin-top: 10px; }

    #difficultyContainer { display: none; }

    #playerInputs input {
        margin: 5px;
        padding: 6px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    #scoreboard { margin-top: 20px; font-size: 1.2em; }

    #message { margin-top: 15px; font-weight: bold; }

    button, select, input[type="number"] {
        margin-top: 10px;
        padding: 8px 12px;
        font-size: 1em;
        border-radius: 8px;
        border: 1px solid #ccc;
        background: white;
        cursor: pointer;
    }

    /* Overlay */
    #overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: white;
        z-index: 999;
    }

    #overlay h1 {
        font-size: 3em;
        margin-bottom: 20px;
    }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <a href="../index.html">Home</a>
</nav>

<h1>Tic-Tac-Toe: Ultimate Loser</h1>
<p>Lose a round? You get a point. Reach the selected limit to become the <strong>Ultimate Loser!</strong></p>

<div id="playerInputs">
    <input type="text" id="playerXName" placeholder="Player X Name">
    <input type="text" id="playerOName" placeholder="Player O Name">
</div>

<div id="controls">
    <label>Mode:</label>
    <select id="mode">
        <option value="pvp">Player vs Player</option>
        <option value="cpu">Player vs Computer</option>
    </select>

    <span id="difficultyContainer">
        <label>Difficulty:</label>
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
    </span>

    <div>
        <label>Loser Points to End Game:</label>
        <input type="number" id="maxPoints" value="10" min="1">
    </div>
</div>

<div id="game"></div>

<div id="scoreboard">
    <p><span id="nameX">Player X</span> (Loser Points): <span id="scoreX">0</span></p>
    <p><span id="nameO">Player O</span> (Loser Points): <span id="scoreO">0</span></p>
</div>

<div id="message"></div>

<button onclick="resetGame()">Play Again</button>
<button onclick="resetAll()">Start Over</button>

<!-- Overlay -->
<div id="overlay">
    <h1 id="finalMessage"></h1>
    <button onclick="resetAll()">Play Again</button>
</div>

<script>
const game = document.getElementById("game");
const message = document.getElementById("message");
const scoreXEl = document.getElementById("scoreX");
const scoreOEl = document.getElementById("scoreO");
const modeSelect = document.getElementById("mode");
const difficultySelect = document.getElementById("difficulty");
const difficultyContainer = document.getElementById("difficultyContainer");
const overlay = document.getElementById("overlay");
const finalMessage = document.getElementById("finalMessage");
const maxPointsInput = document.getElementById("maxPoints");

const playerXInput = document.getElementById("playerXName");
const playerOInput = document.getElementById("playerOName");
const nameXDisplay = document.getElementById("nameX");
const nameODisplay = document.getElementById("nameO");

let board = Array(9).fill("");
let currentPlayer = "X";
let gameActive = true;
let scoreX = 0;
let scoreO = 0;

const winPatterns = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

function updateNames() {
    nameXDisplay.textContent = playerXInput.value || "Player X";
    nameODisplay.textContent = playerOInput.value || "Player O";
}

playerXInput.addEventListener("input", updateNames);
playerOInput.addEventListener("input", updateNames);

function createBoard() {
    game.innerHTML = "";
    board.forEach((_, index) => {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.dataset.index = index;
        cell.addEventListener("click", handleClick);
        game.appendChild(cell);
    });
}

function handleClick(e) {
    const index = e.target.dataset.index;
    if (board[index] !== "" || !gameActive) return;

    makeMove(index, currentPlayer);

    if (gameActive && modeSelect.value === "cpu" && currentPlayer === "O") {
        setTimeout(cpuMove, 300);
    }
}

function makeMove(index, player) {
    board[index] = player;
    document.querySelectorAll(".cell")[index].textContent = player;

    if (checkWinner()) {
        handleLoss(player === "X" ? "O" : "X");
        return;
    }

    if (!board.includes("")) {
        message.textContent = "It's a draw!";
        gameActive = false;
        return;
    }

    currentPlayer = player === "X" ? "O" : "X";
}

function cpuMove() {
    if (!gameActive) return;

    let difficulty = difficultySelect.value;
    let move;

    if (difficulty === "easy") move = randomMove();
    else if (difficulty === "medium") move = Math.random()<0.5 ? smartMove() : randomMove();
    else move = hardModeMove();

    makeMove(move, "O");
}

function randomMove() {
    let empty = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
    return empty[Math.floor(Math.random()*empty.length)];
}

function smartMove() {
    for (let p of winPatterns) {
        let [a,b,c]=p;
        let vals=[board[a],board[b],board[c]];
        if (vals.filter(v=>v==="O").length===2 && vals.includes("")) return p[vals.indexOf("")];
    }
    for (let p of winPatterns) {
        let [a,b,c]=p;
        let vals=[board[a],board[b],board[c]];
        if (vals.filter(v=>v==="X").length===2 && vals.includes("")) return p[vals.indexOf("")];
    }
    return randomMove();
}

function hardModeMove() {
    if (scoreX === (parseInt(maxPointsInput.value) - 1) && scoreO < (parseInt(maxPointsInput.value) - 1)) {
        return randomMove();
    }
    return smartMove();
}

function checkWinner() {
    return winPatterns.some(([a,b,c]) =>
        board[a] && board[a]===board[b] && board[a]===board[c]
    );
}

function handleLoss(loser) {
    gameActive = false;

    if (loser === "X") {
        scoreX++;
        scoreXEl.textContent = scoreX;
    } else {
        scoreO++;
        scoreOEl.textContent = scoreO;
    }

    let loserName = loser === "X" ? nameXDisplay.textContent : nameODisplay.textContent;
    message.textContent = `${loserName} loses this round!`;

    let maxPoints = parseInt(maxPointsInput.value);

    if (scoreX >= maxPoints || scoreO >= maxPoints) {
        showFinalScreen(loserName);
    }
}

function showFinalScreen(loserName) {
    finalMessage.textContent = `${loserName} is the ULTIMATE LOSER 💀`;
    overlay.style.display = "flex";
}

function resetGame() {
    board = Array(9).fill("");
    currentPlayer = "X";
    gameActive = true;
    message.textContent = "";
    createBoard();
}

function resetAll() {
    scoreX = 0;
    scoreO = 0;
    scoreXEl.textContent = 0;
    scoreOEl.textContent = 0;
    overlay.style.display = "none";
    resetGame();
}

modeSelect.addEventListener("change", () => {
    difficultyContainer.style.display = modeSelect.value === "cpu" ? "inline" : "none";
    resetGame();
});

difficultySelect.addEventListener("change", resetGame);

createBoard();
</script>

</body>
</html>
